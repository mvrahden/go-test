name: extension-release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      VSCE_PAT:
        required: true
      OVSX_PAT:
        required: true

concurrency:
  group: extension-release
  cancel-in-progress: false

permissions:
  contents: write

defaults:
  run:
    working-directory: vscode-gotest

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vscode-gotest/package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run compile

  package:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: vscode-gotest/package-lock.json
      - run: npm ci
      - run: npm run compile
      - name: Set version from release tag
        run: npm version "${TAG#v}" --no-git-tag-version
        env:
          TAG: ${{ inputs.tag }}
      - run: npx @vscode/vsce package --no-dependencies
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: vscode-gotest/*.vsix

  publish-github:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - name: Upload .vsix to release
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ inputs.tag }}" *.vsix --clobber

  publish-marketplace:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - working-directory: .
        run: npx @vscode/vsce publish --no-dependencies --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-openvsx:
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
      - working-directory: .
        run: npx ovsx publish *.vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
