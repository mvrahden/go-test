name: release

on:
  release:
    types: [created]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Init workspace
        run: go work init . ./examples
      - run: go vet ./... ./examples/...
      - run: go test -ldflags=-checklinkname=0 ./... -race
      - run: go run ./cmd/gotest spec --no-color --min=40 ./... ./examples/... -race

  build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          version="${{ github.event.release.tag_name }} ($(git rev-parse --short HEAD))"
          go build -ldflags="-s -w -X 'github.com/mvrahden/go-test/about.Version=${version}'" -o "gotest-${GOOS}-${GOARCH}${ext}" ./cmd/gotest
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" gotest-*

  update-major-tag:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Update v1 tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.release.tag_name }}"
          major="${tag%%.*}"
          git tag -fa "$major" -m "$major"
          git push origin "$major" --force

  extension:
    needs: build
    uses: ./.github/workflows/extension-release.yml
    with:
      tag: ${{ github.event.release.tag_name }}
    secrets:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
