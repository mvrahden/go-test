name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - site/**
      - .github/workflows/deploy-site.yml
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # full history so Hugo's GitInfo produces accurate lastmod dates
          fetch-depth: 0
      - name: Check meta description lengths
        run: |
          fail=0
          while IFS= read -r -d '' f; do
            desc=$(awk -F'"' '/^description:/{print $2; exit}' "$f")
            if [ "${#desc}" -gt 160 ]; then
              echo "::error file=$f::meta description is ${#desc} chars (max 160)"
              fail=1
            fi
          done < <(find site/content \( -name '*.md' -o -name '*.html' \) -print0)
          exit $fail
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.157.0'
          extended: true
      - run: hugo --minify --panicOnWarning --source site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
