name: test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore: [vscode-gotest/**]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Format check
        run: test -z "$(gofmt -l .)" || (echo "gofmt needed on:" && gofmt -l . && exit 1)
      - name: Init workspace
        run: go work init . ./examples
      - name: Vuln check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... ./examples/...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          args: ./... ./examples/...

  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build ./...

  platform-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Init workspace
        run: go work init . ./examples
      - name: Test (stdlib)
        run: go test -ldflags=-checklinkname=0 ./... -race
      - name: Test (suites)
        uses: ./
        with:
          packages: "./... ./examples/..."
          race: true

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24", "1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Init workspace
        run: go work init . ./examples
      - name: Vet
        run: go vet ./... ./examples/...
      - name: Lint
        run: go run ./cmd/gotest-lint ./... ./examples/...
      - name: Test (stdlib)
        run: go test -ldflags=-checklinkname=0 -coverprofile=coverage-stdlib.out ./... -race
      - name: Test (suites)
        uses: ./
        with:
          packages: "./... ./examples/..."
          race: true
          min-coverage: 40
          go-test-flags: "-coverprofile=coverage-suites.out"
      - name: Merge coverage
        run: |
          awk '
            FNR==1 && /^mode:/ { if(!mode){mode=$0}; next }
            { key=$1" "$2; if(!(key in max)||$3+0>max[key]+0){max[key]=$3+0;line[key]=$0} }
            END { print mode; n=asorti(line,sorted); for(i=1;i<=n;i++) print line[sorted[i]] }
          ' coverage-stdlib.out coverage-suites.out > coverage.out
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
          echo "**Combined coverage: ${pct}**" >> "$GITHUB_STEP_SUMMARY"
