name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24", "1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Init workspace
        run: go work init . ./examples
      - name: Vet
        run: go vet ./...
      - name: Lint
        run: go run ./cmd/gotest-lint ./...
      - name: Test
        run: go run ./cmd/gotest spec --no-color --output=spec.txt ./... -race -coverprofile=coverage.out
      - name: Summary
        if: always()
        run: |
          if [ -f spec.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat spec.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f coverage.out ]; then
            pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
            echo "**Coverage: ${pct}**" >> "$GITHUB_STEP_SUMMARY"
          fi
