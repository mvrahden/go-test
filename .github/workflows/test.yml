name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.24", "1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Test
        run: go run ./cmd/gotest spec --format=md --output=spec.md ./... -race
      - name: Behavior spec
        if: always()
        run: |
          if [ -f spec.md ]; then
            cat spec.md >> "$GITHUB_STEP_SUMMARY"
          fi
