name: test

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore: [vscode-gotest/**]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build ./...

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ["1.24", "1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Init workspace
        run: go work init . ./examples
      - name: Vet
        run: go vet ./... ./examples/...
      - name: Lint
        run: go run ./cmd/gotest-lint ./... ./examples/...
      - name: Test (stdlib)
        run: go test ./... -race
      - name: Test (suites)
        run: go run ./cmd/gotest spec --no-color --min=40 --output=spec.txt ./... ./examples/... -race -coverprofile=coverage.out
      - name: Summary
        if: always()
        run: |
          if [ -f spec.txt ]; then
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat spec.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -f coverage.out ]; then
            pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}')
            echo "**Coverage: ${pct}**" >> "$GITHUB_STEP_SUMMARY"
          fi
